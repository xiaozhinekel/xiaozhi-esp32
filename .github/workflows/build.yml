name: Build Boards

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Instalar herramientas de compilación
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build ccache dfu-util

      - name: Configurar ESP-IDF
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.1.2

      - name: Forzar idioma en Kconfig
        run: |
          # Modificamos el archivo por defecto para asegurar el idioma
          if [ -f main/Kconfig.projbuild ]; then
            sed -i 's/default "zh"/default "en"/g' main/Kconfig.projbuild
          fi
          if [ -f sdkconfig.defaults ]; then
            sed -i 's/CONFIG_XIAOZHI_LANGUAGE_CHINESE=y/CONFIG_XIAOZHI_LANGUAGE_CHINESE=n/g' sdkconfig.defaults
            echo "CONFIG_XIAOZHI_LANGUAGE_ENGLISH=y" >> sdkconfig.defaults
          fi

      - name: Compilar Firmware
        run: idf.py build

      - name: Crear Merge Binary Unificado
        run: |
          python -m esptool --chip esp32s3 merge_bin -o xiaozhi_internacional.bin --flash_mode dio --flash_size 16MB --flash_freq 80m 0x0 build/bootloader/bootloader.bin 0x8000 build/partition_table/partition-table.bin 0x10000 build/xiaozhi.bin

      - name: Subir mi archivo BIN listo
        uses: actions/upload-artifact@v4
        with:
          name: firmware-xiaozhi-sin-chino
          path: xiaozhi_internacional.bin
